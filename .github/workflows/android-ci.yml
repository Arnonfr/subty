name: Android CI & Firebase Distribution

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Decode Firebase Service Account
        if: github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" ]; then
            echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" | base64 -d > firebase-service-account.json
            echo "FIREBASE_SERVICE_ACCOUNT=$GITHUB_WORKSPACE/firebase-service-account.json" >> $GITHUB_ENV
            echo "HAS_FIREBASE=true" >> $GITHUB_ENV
          else
            echo "HAS_FIREBASE=false" >> $GITHUB_ENV
            echo "Skipping Firebase config: Secret FIREBASE_SERVICE_ACCOUNT_B64 not found."
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          OPENSUBTITLES_API_KEY: ${{ secrets.OPENSUBTITLES_API_KEY }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Firebase App Distribution
        if: env.HAS_FIREBASE == 'true' && github.event_name != 'pull_request'
        run: ./gradlew appDistributionUploadDebug
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
