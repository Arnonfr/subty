name: Firebase App Distribution

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Decode Firebase Service Account
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" | base64 -d > firebase-service-account.json
          echo "FIREBASE_SERVICE_ACCOUNT=$GITHUB_WORKSPACE/firebase-service-account.json" >> $GITHUB_ENV

      - name: Decode google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > app/google-services.json
          else
            echo "Skipping google-services.json: Secret GOOGLE_SERVICES_JSON_B64 not found."
          fi

      # Stable is distributed from all branches (develop + main)
      - name: Build Stable
        run: ./gradlew assembleStableDebug
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          OPENSUBTITLES_API_KEY: ${{ secrets.OPENSUBTITLES_API_KEY }}
          OPENSUBTITLES_USERNAME: ${{ secrets.OPENSUBTITLES_USERNAME }}
          OPENSUBTITLES_PASSWORD: ${{ secrets.OPENSUBTITLES_PASSWORD }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUBDL_API_KEY: ${{ secrets.SUBDL_API }}
          MICROSOFT_API_KEY: ${{ secrets.MICROSOFT_API_KEY }}
          MICROSOFT_REGION: ${{ secrets.MICROSOFT_REGION }}

      - name: Upload Stable to Firebase
        run: ./gradlew appDistributionUploadStableDebug
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          OPENSUBTITLES_API_KEY: ${{ secrets.OPENSUBTITLES_API_KEY }}
          OPENSUBTITLES_USERNAME: ${{ secrets.OPENSUBTITLES_USERNAME }}
          OPENSUBTITLES_PASSWORD: ${{ secrets.OPENSUBTITLES_PASSWORD }}
          SUBDL_API_KEY: ${{ secrets.SUBDL_API }}
          MICROSOFT_API_KEY: ${{ secrets.MICROSOFT_API_KEY }}
          MICROSOFT_REGION: ${{ secrets.MICROSOFT_REGION }}

      # Lab is distributed from main only (requires com.subtranslate.lab in google-services.json)
      - name: Build Lab
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleLabDebug
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          OPENSUBTITLES_API_KEY: ${{ secrets.OPENSUBTITLES_API_KEY }}
          OPENSUBTITLES_USERNAME: ${{ secrets.OPENSUBTITLES_USERNAME }}
          OPENSUBTITLES_PASSWORD: ${{ secrets.OPENSUBTITLES_PASSWORD }}
          SUBDL_API_KEY: ${{ secrets.SUBDL_API }}
          MICROSOFT_API_KEY: ${{ secrets.MICROSOFT_API_KEY }}
          MICROSOFT_REGION: ${{ secrets.MICROSOFT_REGION }}

      - name: Upload Lab to Firebase
        if: github.ref == 'refs/heads/main'
        run: ./gradlew appDistributionUploadLabDebug
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          OPENSUBTITLES_API_KEY: ${{ secrets.OPENSUBTITLES_API_KEY }}
          OPENSUBTITLES_USERNAME: ${{ secrets.OPENSUBTITLES_USERNAME }}
          OPENSUBTITLES_PASSWORD: ${{ secrets.OPENSUBTITLES_PASSWORD }}
          SUBDL_API_KEY: ${{ secrets.SUBDL_API }}
          MICROSOFT_API_KEY: ${{ secrets.MICROSOFT_API_KEY }}
          MICROSOFT_REGION: ${{ secrets.MICROSOFT_REGION }}
